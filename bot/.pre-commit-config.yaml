# Local pre-commit hooks that call tools installed via Poetry
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: poetry run ruff check --fix .
        language: system
        types: [python]
      - id: black
        name: black (format)
        entry: poetry run black .
        language: system
        types: [python]
      - id: isort
        name: isort (import sort)
        entry: poetry run isort .
        language: system
        types: [python]
