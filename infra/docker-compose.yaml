# ─────────────────────────────────────────────────────────────────────────────
# Astro AI - Infrastructure
# Shared infrastructure — Postgres (pgvector) + Supabase Realtime
# All services in the monorepo connect to this via the `nerv` network.
#
# Usage:
#   make infra-up [ENV=dev]
#   docker compose -f infra/docker-compose.yaml --env-file env/.env.<ENV> up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Postgres + pgvector ───────────────────────────────────────────────────
  # pgvector/pgvector is a standard Postgres 15 image with pgvector built in.
  # `make infra-up` enables the extension via docker exec after startup.
  unit-01:
    image: pgvector/pgvector:pg15
    container_name: astro-pgdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - ../env/.env.dev
    networks:
      - nerv

volumes:
  db_data:

networks:
  # External network — all services across the monorepo attach to this
  nerv:
    name: nerv
    driver: bridge
